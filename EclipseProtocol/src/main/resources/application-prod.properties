# ══════════════════════════════════════════════════════════════
# Eclipse Protocol — Perfil de produção (container Docker)
# Ativado via: -Dspring.profiles.active=prod no Dockerfile
# ══════════════════════════════════════════════════════════════

# ── H2 modo arquivo (persiste via volume nomeado)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:/app/data/eclipsedb;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ── HikariCP ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ── H2 Console (acesso externo via browser na VM) ────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ── Servidor ──────────────────────────────────────────────────
server.port=8080

# ── Swagger / SpringDoc ───────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Cache ─────────────────────────────────────────────────────
#spring.cache.type=simple

# ── Actuator ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logs ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.br.com.fiap.eclipseprotocol=INFO
